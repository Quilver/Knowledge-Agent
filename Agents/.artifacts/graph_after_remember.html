<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Cognee Knowledge Graph</title>
<script src="https://d3js.org/d3.v7.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#000000;--bg2:#323332;--surface:rgba(255,255,255,0.06);
  --border:rgba(219,216,216,0.12);--text:#F4F4F4;--text2:#DBD8D8;
  --accent:#6510F4;--accent2:#A550FF;--green:#0DFF00;
  --schema-node:#1a1a2e;--schema-stroke:#A550FF;--schema-link:#555;
}
html.light{
  --bg:#f5f5f5;--bg2:#e8e8e8;--surface:rgba(0,0,0,0.04);
  --border:rgba(0,0,0,0.12);--text:#1a1a1a;--text2:#555555;
  --accent:#6510F4;--accent2:#7c3aed;--green:#16a34a;
  --schema-node:#ffffff;--schema-stroke:#6510F4;--schema-link:#999;
}
html.light body,html.light{background:var(--bg);color:var(--text)}
@font-face{font-family:'Inter';src:local('Inter'),local('Inter-Regular');font-display:swap}
body,html{width:100%;height:100%;overflow:hidden;background:#000000;color:#F4F4F4;font-family:'Inter',system-ui,-apple-system,sans-serif}
canvas{display:block;width:100vw;height:100vh;cursor:grab}
canvas:active{cursor:grabbing}

#header{
  position:fixed;top:0;left:0;right:0;height:48px;
  display:flex;align-items:center;justify-content:space-between;
  padding:0 20px;z-index:100;
  background:none;
  pointer-events:none;
}
#header>*{pointer-events:auto}
.logo{display:flex;align-items:center;gap:8px;font-size:13px;font-weight:600;letter-spacing:0.02em;color:var(--text)}
.logo img{height:28px;width:auto}
.stats{display:flex;gap:16px;font-size:11px;color:var(--text2);font-variant-numeric:tabular-nums}
.stats span{display:flex;align-items:center;gap:4px}
.stats .dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}

#controls{
  position:fixed;bottom:20px;left:50%;transform:translateX(-50%);z-index:100;
  display:flex;gap:2px;padding:4px;
  background:var(--bg2);border:1px solid var(--border);border-radius:10px;
}
.ctrl-btn{
  padding:6px 14px;font-size:11px;font-weight:500;font-family:inherit;
  color:var(--text2);background:transparent;border:none;border-radius:7px;
  cursor:pointer;transition:all 0.15s ease;white-space:nowrap;
}
.ctrl-btn:hover{color:var(--text);background:var(--surface)}
.ctrl-btn.active{color:#F4F4F4;background:rgba(101,16,244,0.2)}
.ctrl-sep{width:1px;background:var(--border);margin:2px 4px}

#search-box{
  position:fixed;top:56px;left:20px;z-index:100;width:280px;
}
#search-input{
  width:100%;padding:8px 12px 8px 32px;
  font-size:12px;font-family:inherit;color:var(--text);
  background:var(--bg2);border:1px solid var(--border);border-radius:8px;
  outline:none;transition:border-color 0.15s;
}
#search-input:focus{border-color:var(--accent)}
#search-input::placeholder{color:var(--text2)}
.search-icon{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--text2);pointer-events:none}

#info-panel{
  position:fixed;top:56px;right:20px;width:320px;max-height:calc(100vh - 80px);
  overflow-y:auto;z-index:100;
  background:var(--bg2);border:1px solid var(--border);border-radius:12px;
  padding:16px;opacity:0;transform:translateX(8px);
  transition:opacity 0.2s ease,transform 0.2s ease;
}
#info-panel.visible{opacity:1;transform:translateX(0)}
#info-panel::-webkit-scrollbar{width:4px}
#info-panel::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
.panel-header{display:flex;align-items:center;gap:8px;margin-bottom:12px}
.panel-type{
  font-size:9px;font-weight:600;text-transform:uppercase;letter-spacing:0.06em;
  padding:2px 6px;border-radius:4px;background:rgba(101,16,244,0.2);color:#A550FF;
}
.panel-title{font-size:14px;font-weight:600;color:var(--text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.panel-section{margin-top:12px;padding-top:12px;border-top:1px solid var(--border)}
.panel-section-title{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:0.05em;color:var(--text2);margin-bottom:8px}
.panel-row{display:flex;justify-content:space-between;align-items:flex-start;padding:3px 0;font-size:12px;gap:12px}
.panel-row .k{color:var(--text2);flex-shrink:0}
.panel-row .v{color:var(--text);text-align:right;word-break:break-word;max-width:200px}

/* ── Legend (Phase 1 polish) ─────────────────────────────────────
   Bottom-left floating card explaining the encodings: node colors by
   stage, the ontology-valid green ring, and the importance-weight node-
   size scale. Populated by JS so only stages actually present in the
   graph appear. */
#legend{
  position:fixed;bottom:20px;left:20px;z-index:90;
  background:var(--bg2);border:1px solid var(--border);border-radius:10px;
  padding:10px 14px;font-size:11px;line-height:1.5;color:var(--text2);
  max-width:380px;
  display:flex;gap:14px;align-items:center;flex-wrap:wrap;
}
.legend-section{display:flex;align-items:center;gap:8px;}
.legend-title{font-size:9.5px;font-weight:600;text-transform:uppercase;letter-spacing:0.06em;color:var(--text2);opacity:0.75;margin-right:2px;}
.legend-items{display:flex;gap:9px;align-items:center;flex-wrap:wrap;}
.legend-item{display:inline-flex;align-items:center;gap:4px;color:var(--text);}
.legend-dot{display:inline-block;width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.legend-ring{
  display:inline-block;width:11px;height:11px;border-radius:50%;
  background:var(--bg);border:2px solid #0DFF00;flex-shrink:0;
}
.legend-sizes{display:inline-flex;align-items:center;gap:4px;}
.legend-sizes .legend-dot{background:var(--text);}
.legend-sep{width:1px;height:18px;background:var(--border);}

.empty-state{
  position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);
  text-align:center;color:var(--text2);font-size:14px;
}

#loading-overlay{
  position:fixed;top:0;left:0;right:0;bottom:0;z-index:200;
  background:rgba(0,0,0,0.92);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  transition:opacity 0.4s ease;
}
#loading-overlay.hidden{opacity:0;pointer-events:none}
#loading-text{font-size:14px;color:var(--text2);margin-bottom:16px}
#loading-bar-bg{width:240px;height:4px;background:var(--bg2);border-radius:2px;overflow:hidden}
#loading-bar{width:0%;height:100%;background:var(--accent);border-radius:2px;transition:width 0.15s linear}
#loading-stats{font-size:11px;color:var(--text2);margin-top:10px;opacity:0.7}

#minimap-container{
  position:fixed;bottom:64px;right:20px;z-index:100;
  border:1px solid var(--border);border-radius:8px;overflow:hidden;
  background:rgba(0,0,0,0.7);cursor:pointer;display:none;
}
#minimap-canvas{display:block}

#fps-counter{
  position:fixed;top:12px;right:180px;z-index:100;
  font-size:10px;color:var(--text2);font-variant-numeric:tabular-nums;
  display:none;pointer-events:none;
}
</style>
</head>
<body>

  <button class="tab-btn active" data-view="graph" style="background:var(--accent);color:#fff;border:none;padding:6px 18px;border-radius:6px 6px 0 0;cursor:pointer;font-size:12px;font-weight:600;">Graph</button>
  <button class="tab-btn" data-view="schema" style="background:transparent;color:var(--text2);border:none;padding:6px 18px;border-radius:6px 6px 0 0;cursor:pointer;font-size:12px;font-weight:600;">Schema</button>
</div>

<button id="theme-toggle" style="position:fixed;top:12px;right:20px;z-index:1200;background:var(--bg2);border:1px solid var(--border);cursor:pointer;font-size:12px;padding:6px 14px;border-radius:8px;color:var(--text);font-family:inherit;font-weight:500;transition:all 0.15s;">Light mode</button>

<div id="search-box">

  <input type="text" id="search-input" placeholder="Search nodes..." autocomplete="off" spellcheck="false">
</div>

<div id="controls">
  <button class="ctrl-btn active" data-labelbudget="key" title="Labels: landmark nodes + high-importance entities">Key</button>
  <button class="ctrl-btn" data-labelbudget="all" title="Labels: every node">All</button>
  <button class="ctrl-btn" data-labelbudget="off" title="Labels: hidden (hover to peek)">Off</button>

  <button class="ctrl-btn active" data-layout="story" title="Pipeline story: Documents &rarr; Chunks &rarr; Entities &rarr; Types &rarr; Summaries">Story</button>
  <button class="ctrl-btn" data-layout="ranked" title="Left-to-right by topological rank">Flow</button>
  <button class="ctrl-btn" data-layout="organic" title="Organic force layout">Force</button>
  <div class="ctrl-sep"></div>
  <button class="ctrl-btn active" data-colorby="type" title="Color by node type">Type</button>
  <button class="ctrl-btn" data-colorby="nodeset" title="Color by source node set">Node set</button>
  <button class="ctrl-btn" data-colorby="user" title="Color by source user">User</button>
  <div class="ctrl-sep"></div>
  <button class="ctrl-btn" id="btn-zoom-out" title="Zoom out (-)">&#x2212;</button>
  <button class="ctrl-btn" id="btn-zoom-in" title="Zoom in (+)">+</button>
  <button class="ctrl-btn" id="btn-fit" title="Fit to view (F)">Fit</button>
</div>

     removed for simplicity. The label visibility is fully controlled by
     the Key/All/Off budget above; node/edge visibility were never useful
     toggles in practice; heatmap and type-cloud layers stay reachable
     via the layers={} state object for power users / URL hash. -->
<button data-layer="heatmap" hidden></button>
<button data-layer="typeclouds" hidden></button>

<div id="info-panel"></div>
<div id="legend"></div>

<div id="loading-overlay">
  <div id="loading-text">Laying out graph...</div>
  <div id="loading-bar-bg"><div id="loading-bar"></div></div>
  <div id="loading-stats"></div>
</div>

<div id="minimap-container"><canvas id="minimap-canvas"></canvas></div>
<div id="fps-counter"></div>

<canvas id="canvas"></canvas>
</div><!-- end graph-view -->

<div id="schema-view" style="display:none;position:fixed;inset:0;background:var(--bg);padding:56px 0 0;overflow:hidden;z-index:900;">
  <div id="schema-header" style="position:absolute;top:56px;left:0;right:0;padding:14px 28px 10px;display:flex;align-items:baseline;justify-content:space-between;gap:16px;">
    <div style="display:flex;align-items:baseline;gap:14px;">
      <h2 style="font-size:18px;font-weight:700;letter-spacing:-0.01em;margin:0;">Memory schema</h2>
      <span id="schema-stats" style="font-size:11px;color:var(--text2);font-variant-numeric:tabular-nums;"></span>

<script>

// Schema view (Phase 2 redesign): explicit-position ontology diagram.
//
// Replaces the previous "type-cards above a force-graph hairball" layout
// with a single primary diagram that's structured, not floating:
//   - Node-type boxes positioned in canonical pipeline order
//     (Documents → Chunks → Entities → Types → Summaries → Context → Schema)
//   - Each box surfaces type name, instance count, modal pipeline+task,
//     and a short field inventory
//   - Edges between node types drawn as labelled curves carrying the
//     relation name + edge count
//   - Below the diagram: edge-type cards listing every relationship type
//     with its source→target pairs
//   - Click a node box or edge card to highlight related elements
//
// Reads ``schemaGraphData`` produced by preprocessor.extract_type_schema_graph_data:
//   - nodes of type GraphNodeType (one per node type, with source_pipeline/
//     source_task/instance_count surfaced at the top level)
//   - nodes of type GraphRelationshipType (one per source_type → target_type
//     pair, with source_type/target_type/relationship_label/edge_count)
//   - links connect type→rel ("from") and rel→type ("to")
(function(){
  const schemaData = null;
  const schemaGraphData = {"nodes": [{"id": "type:DocumentChunk", "name": "DocumentChunk", "type": "GraphNodeType", "rank": 1, "fields": [{"name": "count", "type": "1", "required": true}, {"name": "source_task", "type": "string 100%", "required": true}, {"name": "source_pipeline", "type": "string 100%", "required": true}, {"name": "source_user", "type": "string 100%", "required": true}, {"name": "topological_rank", "type": "integer 100%", "required": true}, {"name": "version", "type": "integer 100%", "required": true}], "source_pipeline": "cognify_pipeline", "source_task": "extract_chunks_from_documents", "source_user": "default_user@example.com", "instance_count": 1}, {"id": "type:Entity", "name": "Entity", "type": "GraphNodeType", "rank": 2, "fields": [{"name": "count", "type": "36", "required": true}, {"name": "source_task", "type": "string 100%", "required": true}, {"name": "source_pipeline", "type": "string 100%", "required": true}, {"name": "topological_rank", "type": "integer 100%", "required": true}, {"name": "version", "type": "integer 100%", "required": true}, {"name": "stage", "type": "string 100%", "required": true}], "source_pipeline": "cognify_pipeline", "source_task": "extract_graph_from_data", "source_user": null, "instance_count": 36}, {"id": "type:EntityType", "name": "EntityType", "type": "GraphNodeType", "rank": 3, "fields": [{"name": "count", "type": "13", "required": true}, {"name": "source_task", "type": "string 100%", "required": true}, {"name": "source_pipeline", "type": "string 100%", "required": true}, {"name": "topological_rank", "type": "integer 100%", "required": true}, {"name": "version", "type": "integer 100%", "required": true}, {"name": "relations", "type": "array 100%", "required": true}], "source_pipeline": "cognify_pipeline", "source_task": "extract_graph_from_data", "source_user": null, "instance_count": 13}, {"id": "type:TextDocument", "name": "TextDocument", "type": "GraphNodeType", "rank": 0, "fields": [{"name": "count", "type": "1", "required": true}, {"name": "source_task", "type": "string 100%", "required": true}, {"name": "source_pipeline", "type": "string 100%", "required": true}, {"name": "source_user", "type": "string 100%", "required": true}, {"name": "topological_rank", "type": "integer 100%", "required": true}, {"name": "version", "type": "integer 100%", "required": true}], "source_pipeline": "cognify_pipeline", "source_task": "classify_documents", "source_user": "default_user@example.com", "instance_count": 1}, {"id": "type:TextSummary", "name": "TextSummary", "type": "GraphNodeType", "rank": 4, "fields": [{"name": "count", "type": "1", "required": true}, {"name": "source_task", "type": "string 100%", "required": true}, {"name": "source_pipeline", "type": "string 100%", "required": true}, {"name": "source_user", "type": "string 100%", "required": true}, {"name": "topological_rank", "type": "integer 100%", "required": true}, {"name": "version", "type": "integer 100%", "required": true}], "source_pipeline": "cognify_pipeline", "source_task": "extract_graph_and_summarize", "source_user": "default_user@example.com", "instance_count": 1}, {"id": "rel:0:DocumentChunk:Entity", "name": "DocumentChunk to Entity", "type": "GraphRelationshipType", "rank": 1.5, "source_type": "DocumentChunk", "target_type": "Entity", "relationship_label": "contains (36)", "edge_count": 36, "fields": [{"name": "edges", "type": "36", "required": true}, {"name": "top relation", "type": "contains", "required": true}, {"name": "relation types", "type": "1", "required": true}]}, {"id": "rel:1:Entity:EntityType", "name": "Entity to EntityType", "type": "GraphRelationshipType", "rank": 2.5, "source_type": "Entity", "target_type": "EntityType", "relationship_label": "is_a (36)", "edge_count": 36, "fields": [{"name": "edges", "type": "36", "required": true}, {"name": "top relation", "type": "is_a", "required": true}, {"name": "relation types", "type": "1", "required": true}]}, {"id": "rel:2:Entity:Entity", "name": "Entity self-links", "type": "GraphRelationshipType", "rank": 2.5, "source_type": "Entity", "target_type": "Entity", "relationship_label": "joined_in_1914 (2), is_a_development_benefiting_from_information_contained_in_the_1917_paper_by (2), +29 more", "edge_count": 34, "fields": [{"name": "edges", "type": "34", "required": true}, {"name": "top relation", "type": "joined_in_1914", "required": true}, {"name": "relation types", "type": "31", "required": true}]}, {"id": "rel:3:DocumentChunk:TextDocument", "name": "DocumentChunk to TextDocument", "type": "GraphRelationshipType", "rank": 0.5, "source_type": "DocumentChunk", "target_type": "TextDocument", "relationship_label": "is_part_of (1)", "edge_count": 1, "fields": [{"name": "edges", "type": "1", "required": true}, {"name": "top relation", "type": "is_part_of", "required": true}, {"name": "relation types", "type": "1", "required": true}]}, {"id": "rel:4:TextSummary:DocumentChunk", "name": "TextSummary to DocumentChunk", "type": "GraphRelationshipType", "rank": 2.5, "source_type": "TextSummary", "target_type": "DocumentChunk", "relationship_label": "made_from (1)", "edge_count": 1, "fields": [{"name": "edges", "type": "1", "required": true}, {"name": "top relation", "type": "made_from", "required": true}, {"name": "relation types", "type": "1", "required": true}]}], "links": [{"source": "type:DocumentChunk", "target": "rel:0:DocumentChunk:Entity", "label": "from"}, {"source": "rel:0:DocumentChunk:Entity", "target": "type:Entity", "label": "to"}, {"source": "type:Entity", "target": "rel:1:Entity:EntityType", "label": "from"}, {"source": "rel:1:Entity:EntityType", "target": "type:EntityType", "label": "to"}, {"source": "type:Entity", "target": "rel:2:Entity:Entity", "label": "from"}, {"source": "rel:2:Entity:Entity", "target": "type:Entity", "label": "to"}, {"source": "type:DocumentChunk", "target": "rel:3:DocumentChunk:TextDocument", "label": "from"}, {"source": "rel:3:DocumentChunk:TextDocument", "target": "type:TextDocument", "label": "to"}, {"source": "type:TextSummary", "target": "rel:4:TextSummary:DocumentChunk", "label": "from"}, {"source": "rel:4:TextSummary:DocumentChunk", "target": "type:DocumentChunk", "label": "to"}]};
  const emptyEl = document.getElementById('schema-empty');
  const svgEl = document.getElementById('schema-svg');

  function escapeHtml(s){
    return String(s == null ? '' : s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
  }
  function stripCoverage(s){
    return String(s || '').replace(/\s*\d+%\s*$/, '');
  }
  function truncate(s, n){
    const text = String(s == null ? '' : s);
    return text.length > n ? text.slice(0, n) + '…' : text;
  }

  // Stage column position by node-type rank (matches preprocessor.node_type_rank).
  // Used to lay out type boxes in pipeline order.
  const STAGE_LABELS = ['Documents', 'Chunks', 'Entities', 'Types', 'Summaries', 'Context'];
  function stageLabel(rank){
    if (typeof rank !== 'number' || !isFinite(rank)) return '';
    const idx = Math.round(rank);
    return STAGE_LABELS[idx] || '';
  }

  // Per-type accent color — keeps the schema palette consistent with the
  // graph view (Entity = purple, Chunk = green, etc.)
  const ACCENT_BY_TYPE = {
    TextDocument: '#A550FF',
    DocumentChunk: '#0DFF00',
    TextSummary: '#6510F4',
    GlobalContextSummary: '#00C2FF',
    Entity: '#6510F4',
    EntityType: '#D5C2FF',
    DatabaseSchema: '#6510F4',
    SchemaTable: '#A550FF',
    SchemaRelationship: '#747470',
    TableType: '#A550FF',
    TableRow: '#A550FF',
    ColumnValue: '#747470',
  };
  function accentFor(name){ return ACCENT_BY_TYPE[name] || '#A550FF'; }

  // ── Build the schema model from preprocessor data ────────────────
  function buildSchemaModel() {
    if (!schemaGraphData || !Array.isArray(schemaGraphData.nodes) || !schemaGraphData.nodes.length) {
      return { nodeTypes: [], edgeTypes: [] };
    }
    const nodeTypes = [];
    const edgeTypes = [];
    schemaGraphData.nodes.forEach(function(n) {
      if (n.type === 'GraphNodeType') {
        nodeTypes.push({
          id: String(n.id),
          name: String(n.name || n.id),
          rank: Number.isFinite(Number(n.rank)) ? Number(n.rank) : 4,
          fields: Array.isArray(n.fields) ? n.fields : [],
          instance_count: n.instance_count != null ? n.instance_count : null,
          source_pipeline: n.source_pipeline || null,
          source_task: n.source_task || null,
          source_user: n.source_user || null,
        });
      } else if (n.type === 'GraphRelationshipType') {
        edgeTypes.push({
          id: String(n.id),
          source_type: n.source_type || '',
          target_type: n.target_type || '',
          // relationship_label looks like "is_a (4)" or "contains (4), made_from (2) +1 more"
          relationship_label: n.relationship_label || '',
          edge_count: n.edge_count || 0,
        });
      }
    });
    // Sort node types by rank, then name; gives stable Story order
    nodeTypes.sort(function(a, b) {
      if (a.rank !== b.rank) return a.rank - b.rank;
      return a.name.localeCompare(b.name);
    });
    return { nodeTypes: nodeTypes, edgeTypes: edgeTypes };
  }

  // Extract the primary relation name from a relationship_label string.
  // "contains (4), made_from (2) +1 more" → "contains"
  function primaryRelation(rel){
    const m = /^([^\s(,]+)/.exec(rel.relationship_label || '');
    return m ? m[1] : 'related';
  }

  // ── Layout: place node-type boxes in stage columns ───────────────
  // Returns a map of type-name → {x, y, w, h, type} and metadata for the
  // overall diagram bounds.
  function layoutBoxes(nodeTypes, totalWidth) {
    const PAD_LEFT = 40;
    const PAD_TOP = 56;       // room for stage header labels
    const BOX_W = 220;
    const BOX_H = 130;
    const COL_GAP = 80;
    const ROW_GAP = 26;
    // Bin by rank
    const byRank = {};
    nodeTypes.forEach(function(t) {
      const r = Math.round(t.rank);
      if (!byRank[r]) byRank[r] = [];
      byRank[r].push(t);
    });
    const ranks = Object.keys(byRank).map(Number).sort(function(a, b) { return a - b; });
    const positions = {};
    let maxY = 0;
    ranks.forEach(function(r, colIdx) {
      const col = byRank[r];
      const colX = PAD_LEFT + colIdx * (BOX_W + COL_GAP);
      col.forEach(function(t, rowIdx) {
        const y = PAD_TOP + rowIdx * (BOX_H + ROW_GAP);
        positions[t.name] = { x: colX, y: y, w: BOX_W, h: BOX_H, type: t, rank: r };
        if (y + BOX_H > maxY) maxY = y + BOX_H;
      });
    });
    const diagramW = Math.max(totalWidth, PAD_LEFT + ranks.length * (BOX_W + COL_GAP));
    const diagramH = maxY + 32;
    return {
      positions: positions,
      width: diagramW,
      height: diagramH,
      ranks: ranks,
      byRank: byRank,
      box_w: BOX_W,
      box_h: BOX_H,
      pad_left: PAD_LEFT,
      col_gap: COL_GAP,
      pad_top: PAD_TOP,
    };
  }

  // Pick a connection point on the box perimeter aimed at a target point.
  // Keeps arrows from emerging out of the middle of a box.
  function boxAnchor(box, towardX, towardY) {
    const cx = box.x + box.w / 2;
    const cy = box.y + box.h / 2;
    const dx = towardX - cx;
    const dy = towardY - cy;
    if (Math.abs(dx) < 1 && Math.abs(dy) < 1) return { x: cx, y: cy };
    const halfW = box.w / 2;
    const halfH = box.h / 2;
    const slope = Math.abs(dy / (dx || 0.001));
    if (slope * halfW < halfH) {
      // Exits left/right side
      const sign = dx > 0 ? 1 : -1;
      return { x: cx + sign * halfW, y: cy + sign * halfW * (dy / (dx || 0.001)) };
    }
    const sign = dy > 0 ? 1 : -1;
    return { x: cx + sign * halfH * (dx / (dy || 0.001)), y: cy + sign * halfH };
  }

  // ── Render the SVG diagram ───────────────────────────────────────
  function renderSchemaDiagram(model) {
    const svg = d3.select('#schema-svg');
    svg.selectAll('*').remove();
    const isLight = document.documentElement.classList.contains('light');

    if (!model.nodeTypes.length) {
      return;
    }

    const containerW = document.getElementById('schema-diagram-section').clientWidth || 1200;
    const layout = layoutBoxes(model.nodeTypes, containerW);
    svg.attr('width', layout.width).attr('height', layout.height);
    const root = svg.append('g');

    // Stage-column headers
    layout.ranks.forEach(function(r, colIdx) {
      const colX = layout.pad_left + colIdx * (layout.box_w + layout.col_gap);
      const label = stageLabel(r);
      if (!label) return;
      root.append('text')
        .attr('class', 'sd-stage-header')
        .attr('x', colX + layout.box_w / 2)
        .attr('y', 28)
        .attr('text-anchor', 'middle')
        .text(label);
    });

    // ── Edges: render as Bezier curves between box anchors ─────────
    // For each unique source_type → target_type pair, group edges by
    // relation so multiple relations between the same pair stack
    // vertically next to the midpoint.
    const positions = layout.positions;
    const edgeGroups = {};
    model.edgeTypes.forEach(function(e) {
      if (!positions[e.source_type] || !positions[e.target_type]) return;
      const key = e.source_type + '|' + e.target_type;
      if (!edgeGroups[key]) edgeGroups[key] = [];
      edgeGroups[key].push(e);
    });

    const drawnEdges = [];
    Object.keys(edgeGroups).forEach(function(key) {
      const group = edgeGroups[key];
      group.forEach(function(e, idxInPair) {
        const src = positions[e.source_type];
        const tgt = positions[e.target_type];
        const srcCx = src.x + src.w / 2;
        const srcCy = src.y + src.h / 2;
        const tgtCx = tgt.x + tgt.w / 2;
        const tgtCy = tgt.y + tgt.h / 2;
        const isSelf = src === tgt;
        let pathD;
        let labelX, labelY;
        if (isSelf) {
          // Self-loop on the right side of the box
          const lx = src.x + src.w;
          const ly = src.y + 20;
          pathD = 'M ' + lx + ' ' + (src.y + 30) +
                  ' C ' + (lx + 60) + ' ' + (src.y + 10) +
                  ', ' + (lx + 60) + ' ' + (src.y + src.h - 10) +
                  ', ' + lx + ' ' + (src.y + src.h - 30);
          labelX = lx + 36;
          labelY = src.y + src.h / 2;
        } else {
          const aSrc = boxAnchor(src, tgtCx, tgtCy);
          const aTgt = boxAnchor(tgt, srcCx, srcCy);
          // Offset multiple relations between the same pair so labels don't overlap
          const offset = (idxInPair - (group.length - 1) / 2) * 22;
          const midX = (aSrc.x + aTgt.x) / 2;
          const midY = (aSrc.y + aTgt.y) / 2;
          const dx = aTgt.x - aSrc.x;
          const dy = aTgt.y - aSrc.y;
          const len = Math.sqrt(dx * dx + dy * dy) || 1;
          // Perpendicular for curvature
          const px = -dy / len;
          const py = dx / len;
          const curveStrength = 30 + Math.abs(offset);
          const cpx = midX + px * curveStrength + (px * offset);
          const cpy = midY + py * curveStrength + (py * offset);
          pathD = 'M ' + aSrc.x + ' ' + aSrc.y +
                  ' Q ' + cpx + ' ' + cpy + ' ' + aTgt.x + ' ' + aTgt.y;
          labelX = cpx;
          labelY = cpy;
        }
        drawnEdges.push({ edge: e, path: pathD, labelX: labelX, labelY: labelY });
      });
    });

    // Arrow marker (one shared definition)
    const defs = svg.append('defs');
    defs.append('marker')
      .attr('id', 'sd-arrow')
      .attr('viewBox', '0 -5 10 10')
      .attr('refX', 8)
      .attr('refY', 0)
      .attr('markerWidth', 7)
      .attr('markerHeight', 7)
      .attr('orient', 'auto')
      .append('path')
      .attr('d', 'M0,-4L8,0L0,4')
      .attr('fill', isLight ? '#666' : '#aaa');

    // Draw edge paths first so labels render on top
    const edgeGroup = root.append('g').attr('class', 'sd-edges');
    drawnEdges.forEach(function(de) {
      edgeGroup.append('path')
        .datum(de.edge)
        .attr('class', 'sd-edge-path')
        .attr('data-edge-id', de.edge.id)
        .attr('data-source-type', de.edge.source_type)
        .attr('data-target-type', de.edge.target_type)
        .attr('d', de.path)
        .attr('marker-end', 'url(#sd-arrow)');
    });

    // Edge labels
    const labelGroup = root.append('g').attr('class', 'sd-edge-labels');
    drawnEdges.forEach(function(de) {
      const rel = primaryRelation(de.edge);
      const cnt = de.edge.edge_count ? '×' + de.edge.edge_count : '';
      const labelText = rel + (cnt ? '  ' + cnt : '');
      // Background pill so the label reads cleanly over crossing arrows
      const tmp = labelGroup.append('text')
        .attr('class', 'sd-edge-label')
        .text(labelText)
        .style('visibility', 'hidden');
      const bbox = tmp.node().getBBox();
      tmp.remove();
      const pad = 6;
      labelGroup.append('rect')
        .attr('class', 'sd-edge-label-bg')
        .attr('data-edge-id', de.edge.id)
        .attr('x', de.labelX - bbox.width / 2 - pad)
        .attr('y', de.labelY - bbox.height / 2 - 1)
        .attr('width', bbox.width + pad * 2)
        .attr('height', bbox.height + 2)
        .attr('rx', 4);
      labelGroup.append('text')
        .attr('class', 'sd-edge-label')
        .attr('data-edge-id', de.edge.id)
        .attr('x', de.labelX)
        .attr('y', de.labelY)
        .attr('text-anchor', 'middle')
        .attr('dominant-baseline', 'central')
        .text(labelText);
    });

    // ── Node-type boxes ────────────────────────────────────────────
    const nodeGroup = root.append('g').attr('class', 'sd-nodes');
    Object.keys(positions).forEach(function(name) {
      const p = positions[name];
      const t = p.type;
      const accent = accentFor(name);
      const g = nodeGroup.append('g')
        .attr('class', 'sd-node-box')
        .attr('data-node-type', name)
        .attr('transform', 'translate(' + p.x + ',' + p.y + ')');

      // Card body
      g.append('rect')
        .attr('width', p.w)
        .attr('height', p.h)
        .attr('rx', 10)
        .attr('fill', isLight ? '#ffffff' : '#1a1a22')
        .attr('stroke', isLight ? 'rgba(30,30,30,0.18)' : 'rgba(244,244,244,0.16)')
        .attr('stroke-width', 1);
      // Accent stripe on the left
      g.append('rect')
        .attr('width', 4)
        .attr('height', p.h)
        .attr('rx', 1)
        .attr('fill', accent);

      // Header: type name + count
      g.append('text')
        .attr('x', 16)
        .attr('y', 22)
        .attr('font-size', 14)
        .attr('font-weight', 700)
        .attr('fill', isLight ? '#1a1a1a' : '#F4F4F4')
        .text(truncate(name, 22));
      if (t.instance_count != null) {
        const txt = t.instance_count + ' instance' + (t.instance_count === 1 ? '' : 's');

    const dia = document.getElementById('schema-diagram-section');
    if (hdr) hdr.style.display = '';
    if (dia) dia.style.display = '';
  }

  window._renderSchemaGraph = function() {
    const model = buildSchemaModel();
    if (!model.nodeTypes.length) {
      setSchemaEmpty('No schema configured for this dataset.');
      const statsEl = document.getElementById('schema-stats');
      if (statsEl) statsEl.textContent = '';
      return;
    }
    hideSchemaEmpty();

    const totalInstances = model.nodeTypes.reduce(function(s, t) {
      return s + (t.instance_count || 0);
    }, 0);
    // Edge-type count = unique relation names (collapses multiple
    // source→target pairs that share a relation).
    const uniqueRels = new Set(model.edgeTypes.map(primaryRelation));
    const statsEl = document.getElementById('schema-stats');
    if (statsEl) {
      statsEl.textContent =
        model.nodeTypes.length + ' node types · ' +
        uniqueRels.size + ' edge types · ' +
        totalInstances + ' total instances';
    }

    renderSchemaDiagram(model);
  };

  if (!schemaData && (!schemaGraphData || !schemaGraphData.nodes || !schemaGraphData.nodes.length)) {
    setSchemaEmpty('No schema configured for this dataset.');
  }
})();

var taskColors = {"classify_documents": "#db5656", "extract_chunks_from_documents": "#56db7d", "extract_graph_and_summarize": "#a456db", "extract_graph_from_data": "#dbca56"};
var pipelineColors = {"cognify_pipeline": "#db5656"};
var nodesetColors = {};
var userColors = {"default_user@example.com": "#db5656"};

if (!nodes || nodes.length === 0) {
  document.body.innerHTML = '<div class="empty-state">No graph data available</div>';
  return;
}

// ── Helpers ──
function esc(s){return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;")}
function truncate(s,n){if(!s)return"";return s.length>n?s.slice(0,n)+"\u2026":s}
function hexToRgb(hex){
  if(!hex)return[219,216,216];
  var c=hex.replace("#","");
  if(c.length===3)c=c[0]+c[0]+c[1]+c[1]+c[2]+c[2];
  var n=parseInt(c,16);
  return[(n>>16)&255,(n>>8)&255,n&255];
}
function hslToRgb(h,s,l){
  s/=100;l/=100;
  var a=s*Math.min(l,1-l);
  function f(n){var k=(n+h/30)%12;return l-a*Math.max(-1,Math.min(k-3,9-k,1))}
  return[Math.round(f(0)*255),Math.round(f(8)*255),Math.round(f(4)*255)];
}
function clamp(v,lo,hi){return v<lo?lo:v>hi?hi:v}
function lerp(a,b,t){return a+(b-a)*t}

var N=nodes.length;
var M=links.length;

// ── Resolve IDs ──
nodes.forEach(function(n){
  if(!n.id)n.id=n.node_id||n.uuid||n.external_id||n.name||Math.random().toString(36);
});
var nodeMap={};
nodes.forEach(function(n){nodeMap[n.id]=n});
links=links.filter(function(l){
  var s=typeof l.source==="object"?(l.source.id||l.source):l.source;
  var t=typeof l.target==="object"?(l.target.id||l.target):l.target;
  return nodeMap[s]&&nodeMap[t];
});
M=links.length;

// ── Compute node degrees for sizing ──
var degreeMap={};
nodes.forEach(function(n){degreeMap[n.id]=0});
links.forEach(function(l){
  var s=typeof l.source==="object"?l.source.id:l.source;
  var t=typeof l.target==="object"?l.target.id:l.target;
  degreeMap[s]=(degreeMap[s]||0)+1;
  degreeMap[t]=(degreeMap[t]||0)+1;
});
var maxDeg=Math.max(1,Math.max.apply(null,Object.values(degreeMap)));
// Node radius blends degree (base size from connections) with
// importance_weight (per-node hand-set or memify-set importance). Default
// importance is 0.5 → factor 1.0 (no change). High importance (1.0) →
// factor 1.5 (50% larger). Low importance (0.0) → factor 0.6 (smaller).
nodes.forEach(function(n){
  n._degree=degreeMap[n.id]||0;
  var imp=(typeof n.importance_weight==="number")?n.importance_weight:0.5;
  if(imp<0)imp=0;if(imp>1)imp=1;
  var impFactor=0.6+imp*0.9;
  n._r=(4+Math.sqrt(n._degree/maxDeg)*10)*impFactor;
});

// Pre-sort nodes by degree descending (for adaptive labels)
var nodesByDegree=nodes.slice().sort(function(a,b){return b._degree-a._degree});
var topDegreeSet=new Set();
nodesByDegree.slice(0,Math.min(10,N)).forEach(function(n){topDegreeSet.add(n.id)});

// ── Layout model ──
var layoutMode="story";
var rankColumns=[];
var rankColumnGap=260;
var organicClusters=[];

function boolValue(v){
  if(v===true)return true;
  if(v===false||v===undefined||v===null)return false;
  return String(v).toLowerCase()==="true";
}
function numberValue(v){
  var n=Number(v);
  return Number.isFinite(n)?n:null;
}
function stableHash(value){
  var text=String(value||"");
  var hash=0;
  for(var i=0;i<text.length;i++){hash=((hash<<5)-hash+text.charCodeAt(i))|0}
  return Math.abs(hash);
}

var hasMeaningfulTopologicalRank=nodes.some(function(n){
  var rank=numberValue(n.topological_rank);
  return rank!==null&&rank!==0;
});
var maxGlobalContextLevel=0;
nodes.forEach(function(n){
  if(n.type==="GlobalContextSummary"&&!boolValue(n.is_root)){
    var level=numberValue(n.level);
    if(level!==null)maxGlobalContextLevel=Math.max(maxGlobalContextLevel,level);
  }
});

function inferLayoutCategory(n){
  if(hasMeaningfulTopologicalRank){
    var rank=numberValue(n.topological_rank);
    return "Rank "+(rank===null?0:rank);
  }
  if(n.type==="TextDocument")return "Document";
  if(n.type==="DocumentChunk")return "Chunk";
  if(n.type==="TextSummary")return "Summary";
  if(n.type==="GlobalContextSummary"){
    if(boolValue(n.is_root))return "Context Root";
    var level=numberValue(n.level);
    return "Context L"+(level===null?0:level);
  }
  if(n.type==="Entity")return "Entity";
  if(n.type==="EntityType")return "Type";
  if(n.type==="DatabaseSchema")return "Database";
  if(n.type==="SchemaTable"||n.type==="TableType")return "Table";
  if(n.type==="SchemaRelationship")return "Schema Rel";
  if(n.type==="TableRow")return "Row";
  if(n.type==="ColumnValue")return "Column";
  return n.type||"Node";
}

function inferLayoutRank(n){
  if(hasMeaningfulTopologicalRank){
    var rank=numberValue(n.topological_rank);
    if(rank!==null)return rank;
  }
  if(n.type==="TextDocument")return 0;
  if(n.type==="DocumentChunk")return 1;
  if(n.type==="TextSummary")return 2;
  if(n.type==="GlobalContextSummary"){
    if(boolValue(n.is_root))return 4+maxGlobalContextLevel;
    var level=numberValue(n.level);
    return 3+(level===null?0:level);
  }
  if(n.type==="Entity")return 3;
  if(n.type==="EntityType")return 4;
  if(n.type==="DatabaseSchema")return 0;
  if(n.type==="SchemaTable"||n.type==="TableType")return 1;
  if(n.type==="SchemaRelationship")return 2;
  if(n.type==="TableRow")return 2;
  if(n.type==="ColumnValue")return 3;
  if(n.source_task&&String(n.source_task).indexOf("extract_chunks")>=0)return 1;
  if(n.source_task&&String(n.source_task).indexOf("summar")>=0)return 2;
  if(n.source_task&&String(n.source_task).indexOf("graph")>=0)return 3;
  return 3;
}

function layoutLaneKey(n){
  if(n.source_content_hash)return n.source_content_hash;
  if(n.source_node_set)return n.source_node_set;
  if(n.type==="GlobalContextSummary")return n.type+":"+(n.level||0)+":"+(n.id||n.name);
  if(n.type==="EntityType")return n.name||n.id;
  return (n.type||"Node")+":"+(n.name||n.id);
}

function labelForRank(rankStats){
  var entries=Object.keys(rankStats).sort(function(a,b){
    return rankStats[b]-rankStats[a]||a.localeCompare(b);
  });
  if(entries.length===0)return "Nodes";
  if(entries.length>1&&rankStats[entries[1]]/rankStats[entries[0]]>=0.25){
    return entries[0]+" / "+entries[1];
  }
  return entries[0];
}

// ── Pipeline (Story) layout — bins nodes by preprocessor.stage ──
// Each stage becomes one vertical column laid left-to-right in the
// canonical order set by preprocessor.STAGE_ORDER. Within each column
// nodes are sorted by (visual_rank, importance desc). Falls back to
// computeRankedLayout() for graphs without preprocessor stage info.
var STORY_STAGE_ORDER=["document","chunk","entity","type","summary","context","schema","other"];
var STORY_STAGE_LABEL={
  document:"Documents",
  chunk:"Chunks",
  entity:"Entities",
  type:"Types",
  summary:"Summaries",
  context:"Context",
  schema:"Schema",
  other:"Other",
};
function computePipelineLayout(){
  var stageCounts={};
  nodes.forEach(function(n){
    var s=n.stage||"other";
    stageCounts[s]=(stageCounts[s]||0)+1;
  });
  var presentStages=STORY_STAGE_ORDER.filter(function(s){return stageCounts[s]>0});
  if(presentStages.length<2){
    computeRankedLayout();
    return;
  }
  var gapBase=N>2000?190:N>500?220:270;
  rankColumnGap=gapBase;
  rankColumns=presentStages.map(function(stage,index){
    return {
      rank: index,
      index: index,
      x: (index-(presentStages.length-1)/2)*rankColumnGap,
      label: STORY_STAGE_LABEL[stage]+" ("+stageCounts[stage]+")",
      stage: stage,
    };
  });
  var stageIndexMap={};
  presentStages.forEach(function(stage,index){stageIndexMap[stage]=index});

  var byStage={};
  presentStages.forEach(function(s){byStage[s]=[]});
  nodes.forEach(function(n){
    var s=n.stage||"other";
    if(!byStage[s])byStage[s]=[];
    byStage[s].push(n);
  });
  presentStages.forEach(function(stage){
    byStage[stage].sort(function(a,b){
      var ra=numberValue(a.visual_rank)||0;
      var rb=numberValue(b.visual_rank)||0;
      if(ra!==rb)return ra-rb;
      return (b.importance||0)-(a.importance||0);
    });
  });

  // Dense stages (e.g. 200+ entities on the Alice book) get packed into
  // multiple sub-columns within their stage's allotted horizontal slot,
  // so the vertical span stays readable and auto-fit doesn't crush
  // everything to 0.05x zoom. Sub-column gap is kept tight (≤ 28px) so
  // each stage still reads as ONE cluster, not as multiple stages.
  //
  // Lane spacing has to clear the LARGEST possible importance-scaled
  // node diameter so high-importance nodes (impFactor up to 1.5 → radius
  // up to ~21px → diameter ~42px) don't overlap their neighbors. We add
  // a 12px breathing margin on top of that floor.
  var laneSpacing=N>1000?32:N>300?40:N>120?52:64;
  var MAX_ROWS_PER_SUBCOL=36;
  presentStages.forEach(function(stage){
    var colIdx=stageIndexMap[stage];
    var column=rankColumns[colIdx];
    var colNodes=byStage[stage];
    var n=colNodes.length;
    var subCols=Math.max(1,Math.ceil(n/MAX_ROWS_PER_SUBCOL));
    var rowsPerSub=Math.ceil(n/subCols);
    // Sub-column gap deliberately tight (max 28px) so the cluster reads
    // as a single stage, not as multiple stages. Constrain total cluster
    // width to ~55% of the stage slot — leaves clear gutters either side.
    var maxClusterW=rankColumnGap*0.55;
    var subGap=subCols>1?Math.min(28,maxClusterW/(subCols-1)):0;
    var totalHeight=(rowsPerSub-1)*laneSpacing;
    var startY=-totalHeight/2;
    var startSubX=column.x-(subCols-1)*subGap/2;
    colNodes.forEach(function(node,i){
      var sub=Math.floor(i/rowsPerSub);
      var row=i%rowsPerSub;
      node._layoutRank=colIdx;
      node._layoutCategory=STORY_STAGE_LABEL[stage];
      node._targetX=startSubX+sub*subGap;
      node._targetY=startY+row*laneSpacing;
      if(typeof node.x!=="number"||!isFinite(node.x)){
        var jitter=(stableHash(node.id)%100)/100-0.5;
        node.x=node._targetX+jitter*Math.max(subGap,12)*0.3;
        node.y=node._targetY+jitter*laneSpacing;
      }
      // Pin BOTH x and y in Story mode — the layout is meant to be a
      // clean deterministic grid (one row per node within each stage
      // column). Letting y float lets link forces pull connected nodes
      // toward each other, which collapsed nodes onto neighbors. Fully
      // pinned + sufficient laneSpacing = no overlap. Cleared by
      // applyLayoutMode on switch to Flow / Force / Organic layouts.
      node.fx=node._targetX;
      node.fy=node._targetY;
    });
  });
}

function computeRankedLayout(){
  var rankStats={};
  nodes.forEach(function(n){
    var rank=inferLayoutRank(n);
    var category=inferLayoutCategory(n);
    n._layoutRank=rank;
    n._layoutCategory=category;
    if(!rankStats[rank])rankStats[rank]={};
    rankStats[rank][category]=(rankStats[rank][category]||0)+1;
  });

  var ranks=Object.keys(rankStats).map(Number).sort(function(a,b){return a-b});
  var gapBase=N>2000?190:N>500?220:270;
  rankColumnGap=gapBase;
  rankColumns=ranks.map(function(rank,index){
    return {
      rank: rank,
      index: index,
      x: (index-(ranks.length-1)/2)*rankColumnGap,
      label: labelForRank(rankStats[rank]),
    };
  });

  var rankIndexByValue={};
  rankColumns.forEach(function(column,index){rankIndexByValue[column.rank]=index});
  var laneSpacing=N>1000?34:N>300?44:58;
  nodes.forEach(function(n){
    var column=rankColumns[rankIndexByValue[n._layoutRank]];
    var hash=stableHash(layoutLaneKey(n));
    var laneCount=N>1500?17:N>500?13:9;
    var lane=hash%laneCount-Math.floor(laneCount/2);
    var jitter=(stableHash(n.id)%100)/100-0.5;
    n._targetX=column?column.x:0;
    n._targetY=lane*laneSpacing+jitter*laneSpacing*0.35;
    if(typeof n.x!=="number"||!isFinite(n.x)){
      n.x=n._targetX+jitter*rankColumnGap*0.25;
      n.y=n._targetY+jitter*laneSpacing;
    }
  });
}

function computeOrganicLayout(){
  var counts={};
  nodes.forEach(function(n){
    var type=n.type||"Node";
    counts[type]=(counts[type]||0)+1;
  });

  var types=Object.keys(counts).sort(function(a,b){return counts[b]-counts[a]||a.localeCompare(b)});
  var radius=clamp(Math.sqrt(N)*20,180,520);
  organicClusters=types.map(function(type,index){
    var angle=types.length===1?0:-Math.PI/2+index*Math.PI*2/types.length;
    var clusterRadius=clamp(64+Math.sqrt(counts[type])*9,96,240);
    return {
      type:type,
      count:counts[type],
      x:types.length===1?0:Math.cos(angle)*radius,
      y:types.length===1?0:Math.sin(angle)*radius,
      radius:clusterRadius,
    };
  });

  var clusterByType={};
  organicClusters.forEach(function(cluster){clusterByType[cluster.type]=cluster});
  nodes.forEach(function(n){
    var cluster=clusterByType[n.type||"Node"]||{x:0,y:0,radius:120};
    var angleHash=stableHash((n.id||n.name||"")+":angle")%6283/1000;
    var distHash=(stableHash((n.id||n.name||"")+":distance")%1000)/1000;
    var localRadius=Math.sqrt(distHash)*cluster.radius*0.62;
    n._organicX=cluster.x+Math.cos(angleHash)*localRadius;
    n._organicY=cluster.y+Math.sin(angleHash)*localRadius;
  });
}
if(layoutMode==="story")computePipelineLayout();else computeRankedLayout();

// ── Color palette ──
var colorByType={
  "Entity":"#6510F4","EntityType":"#A550FF","DocumentChunk":"#0DFF00",
  "TextSummary":"#6510F4","GlobalContextSummary":"#00C2FF",
  "TableRow":"#A550FF","TableType":"#6510F4",
  "ColumnValue":"#747470","SchemaTable":"#A550FF","DatabaseSchema":"#6510F4",
  "SchemaRelationship":"#323332"
};
var typeColors={};
var typeRgbCache={};
var hueStep=0;
nodes.forEach(function(n){
  if(!n.color)n.color=colorByType[n.type]||null;
  if(!n.color){
    if(!typeColors[n.type]){
      var hue=(hueStep*137.5)%360;hueStep++;
      typeColors[n.type]="hsl("+hue+",55%,65%)";
    }
    n.color=typeColors[n.type];
  }
  // Cache RGB per type
  if(!typeRgbCache[n.type]){
    var c=n.color;
    if(c.indexOf("hsl")===0){
      var m=c.match(/[\d.]+/g);
      typeRgbCache[n.type]=hslToRgb(+m[0],+m[1],+m[2]);
    }else{
      typeRgbCache[n.type]=hexToRgb(c);
    }
  }
  n._rgb=typeRgbCache[n.type];
  if(n.ontology_valid===true){
    n.color="#D8D8D8";
    n._rgb=[216,216,216];
  }
});

// ── Color-by mode ──
var colorByMode="type";

function recolorNodes(){
  nodes.forEach(function(n){
    if(colorByMode==="type"){
      n.color=colorByType[n.type]||typeColors[n.type]||"#DBD8D8";
    }else if(colorByMode==="task"){
      n.color=taskColors[n.source_task||"Unknown"]||"#DBD8D8";
    }else if(colorByMode==="pipeline"){
      n.color=pipelineColors[n.source_pipeline||"Unknown"]||"#DBD8D8";
    }else if(colorByMode==="nodeset"){
      n.color=nodesetColors[n.source_node_set||"Unknown"]||"#DBD8D8";
    }else if(colorByMode==="user"){
      n.color=userColors[n.source_user||"Unknown"]||"#DBD8D8";
    }
    if(colorByMode==="type"&&n.ontology_valid===true){
      n.color="#D8D8D8";
      n._rgb=[216,216,216];
    }else{
      // Recache RGB
      if(n.color.indexOf("hsl")===0){
        var m=n.color.match(/[\d.]+/g);
        n._rgb=hslToRgb(+m[0],+m[1],+m[2]);
      }else{
        n._rgb=hexToRgb(n.color);
      }
    }
  });
}

nodes.forEach(function(n){typeCounts[n.type]=(typeCounts[n.type]||0)+1});
var taskCounts={};
nodes.forEach(function(n){var t=n.source_task||"Unknown";taskCounts[t]=(taskCounts[t]||0)+1});
var pipeCounts={};

    colorSource=function(t){return colorByType[t]||typeColors[t]||"#DBD8D8"};
    sectionLabel="Node type";
  }else if(colorByMode==="task"){
    counts=taskCounts;
    entries=Object.keys(counts).sort(function(a,b){return counts[b]-counts[a]});
    colorSource=function(t){return taskColors[t]||"#DBD8D8"};
    sectionLabel="Task";
  }else if(colorByMode==="pipeline"){
    counts=pipeCounts;
    entries=Object.keys(counts).sort(function(a,b){return counts[b]-counts[a]});
    colorSource=function(t){return pipelineColors[t]||"#DBD8D8"};
    sectionLabel="Pipeline";
  }else if(colorByMode==="nodeset"){
    counts=nodesetCounts;
    entries=Object.keys(counts).sort(function(a,b){return counts[b]-counts[a]});
    colorSource=function(t){return nodesetColors[t]||"#DBD8D8"};

      colorSource(t)+'"></span>'+esc(t)+'</span>';

// ── Transform state ──
var tx=W/2,ty=H/2,scale=1;

// ── Smooth zoom animation state ──
var zoomAnim=null; // {fromScale,toScale,fromTx,toTx,fromTy,toTy,startTime,duration}

function animateZoom(){
  if(!zoomAnim)return;
  var elapsed=performance.now()-zoomAnim.startTime;
  var t=Math.min(1,elapsed/zoomAnim.duration);
  // Ease out cubic
  var e=1-Math.pow(1-t,3);
  scale=lerp(zoomAnim.fromScale,zoomAnim.toScale,e);
  tx=lerp(zoomAnim.fromTx,zoomAnim.toTx,e);
  ty=lerp(zoomAnim.fromTy,zoomAnim.toTy,e);
  draw();
  if(t<1){requestAnimationFrame(animateZoom)}
  else{zoomAnim=null}
}

function smoothZoomTo(newScale,pivotX,pivotY,duration){
  newScale=clamp(newScale,0.02,30);
  var ratio=newScale/scale;
  var newTx=pivotX-(pivotX-tx)*ratio;
  var newTy=pivotY-(pivotY-ty)*ratio;
  zoomAnim={fromScale:scale,toScale:newScale,fromTx:tx,toTx:newTx,fromTy:ty,toTy:newTy,startTime:performance.now(),duration:duration||150};
  requestAnimationFrame(animateZoom);
}

function smoothPanZoomTo(newScale,newTx,newTy,duration){
  newScale=clamp(newScale,0.02,30);
  zoomAnim={fromScale:scale,toScale:newScale,fromTx:tx,toTx:newTx,fromTy:ty,toTy:newTy,startTime:performance.now(),duration:duration||300};
  requestAnimationFrame(animateZoom);
}

// ── Zoom-to-fit ──
function zoomToFit(animated){
  var minX=Infinity,maxX=-Infinity,minY=Infinity,maxY=-Infinity;
  var valid=0;
  nodes.forEach(function(n){
    if(typeof n.x!=="number"||!isFinite(n.x))return;
    valid++;
    if(n.x<minX)minX=n.x;if(n.x>maxX)maxX=n.x;
    if(n.y<minY)minY=n.y;if(n.y>maxY)maxY=n.y;
  });
  if(valid===0){return}
  var pad=0.06;
  var gw=maxX-minX||100;
  var gh=maxY-minY||100;
  var cx=(minX+maxX)/2;
  var cy=(minY+maxY)/2;
  var sx=W*(1-2*pad)/gw;
  var sy=H*(1-2*pad)/gh;
  // Hard floor so a sprawling graph still renders nodes at a readable
  // size — user can pan to see anything outside the viewport.
  var MIN_FIT_SCALE=0.55;
  var ns=Math.max(MIN_FIT_SCALE,Math.min(sx,sy,10));
  var ntx=W/2-cx*ns;
  var nty=H/2-cy*ns;
  if(animated){smoothPanZoomTo(ns,ntx,nty,400)}
  else{scale=ns;tx=ntx;ty=nty;draw()}
}

var repStr,linkDist,alphaDecayVal,velDecayVal,distMaxVal,collideIter;
if(N>10000){

}else if(N>5000){
  repStr=-40;linkDist=30;alphaDecayVal=0.04;velDecayVal=0.5;distMaxVal=300;collideIter=0;
}else if(N>2000){
  repStr=-60;linkDist=40;alphaDecayVal=0.03;velDecayVal=0.45;distMaxVal=400;collideIter=1;
}else if(N>500){
  repStr=-120;linkDist=70;alphaDecayVal=0.02;velDecayVal=0.4;distMaxVal=500;collideIter=1;
}else{
  repStr=-180;linkDist=100;alphaDecayVal=0.02;velDecayVal=0.4;distMaxVal=600;collideIter=1;
}

var MAX_TICKS=N>10000?300:N>5000?400:1000;

var simulation=d3.forceSimulation(nodes)
  .force("link",d3.forceLink(links).id(function(d){return d.id}).distance(linkDist).strength(0.2))
  .force("charge",d3.forceManyBody().strength(repStr).distanceMax(distMaxVal))
  .force("center",d3.forceCenter(0,0))
  .force("x",d3.forceX(function(d){return d._targetX||0}).strength(0.22))
  .force("y",d3.forceY(function(d){return d._targetY||0}).strength(0.08))
  .alphaDecay(alphaDecayVal)
  .velocityDecay(velDecayVal);

if(collideIter>0){
  simulation.force("collide",d3.forceCollide().radius(function(d){return d._r+2}).iterations(collideIter));
}

function applyLayoutMode(restart){
  if(layoutMode==="story")computePipelineLayout();
  else computeRankedLayout();
  // story mode reuses the column-layout positioning machinery; both
  // "ranked" (by topological_rank) and "story" (by preprocessor.stage)
  // produce rankColumns and per-node _targetX/_targetY.
  if((layoutMode==="ranked"||layoutMode==="story")&&rankColumns.length>1){
    // Pin both axes in Story mode (computePipelineLayout already did
    // this but applyLayoutMode may be invoked after a flow-mode unpin,
    // so re-pin here defensively). Other layouts must unpin.
    if(layoutMode==="story"){
      nodes.forEach(function(n){
        if(typeof n._targetX==="number")n.fx=n._targetX;
        if(typeof n._targetY==="number")n.fy=n._targetY;
      });
    }else{
      nodes.forEach(function(n){n.fx=null;n.fy=null});
    }
    simulation.force("link").distance(linkDist).strength(0.2);
    simulation.force("charge").strength(repStr);
    simulation.force("x",d3.forceX(function(d){return d._targetX||0}).strength(0.22));
    simulation.force("y",d3.forceY(function(d){return d._targetY||0}).strength(0.08));
  }else{
    // Organic / Force mode — clear any pinned coords from a previous
    // Story-mode run so the simulation can move nodes anywhere.
    nodes.forEach(function(n){n.fx=null;n.fy=null});
    // Force-mode semantic tuning (Phase 1 polish, Codex critique). Three
    // signals layered on top of the legacy organic layout:
    //  - Per-link strength: structural relations are LOOSER (entities can
    //    drift away from their chunk-containment skeleton) so semantic
    //    edges aren't drowned out. Semantic links pull TIGHTER, surfacing
    //    real connections.
    //  - Per-node charge: hubs (high-degree nodes) repel more strongly
    //    proportional to log(degree), spreading them out so they stop
    //    occluding their neighbors.
    //  - Per-link distance: structural links allowed to stretch further.
    computeOrganicLayout();
    simulation.force("link")
      .distance(function(l){return l.edge_class==="semantic"?linkDist*0.9:linkDist*1.5})
      .strength(function(l){return l.edge_class==="semantic"?0.32:0.06});
    simulation.force("charge").strength(function(d){
      var deg=d._degree||0;
      return repStr*(1+Math.log(1+deg)*0.45);
    });
    simulation.force("x",d3.forceX(function(d){return d._organicX||0}).strength(0.075));
    simulation.force("y",d3.forceY(function(d){return d._organicY||0}).strength(0.075));
  }
  if(restart){
    simDone=false;
    simTickCount=0;
    simulation.alpha(0.8).restart();
    draw();
  }
}

    .x(function(d){return d.x})

// ── Adjacency index ──
var adjMap={};
nodes.forEach(function(n){adjMap[n.id]=[]});

// Simulation tick handler
simulation.on("tick",function(){
  simTickCount++;

  // Rebuild adjacency once after link objects are resolved
  if(simTickCount===1){
    adjMap={};
    nodes.forEach(function(n2){adjMap[n2.id]=[]});
    links.forEach(function(l){
      var sid=l.source.id||l.source;
      var tid=l.target.id||l.target;
      if(adjMap[sid])adjMap[sid].push(tid);
      if(adjMap[tid])adjMap[tid].push(sid);
    });
  }

  // Rebuild quadtree periodically
  if(simTickCount%qtRebuildInterval===0){rebuildQuadtree()}

  // Update loading progress
  if(showLoading&&!simDone){
    var pct=Math.min(99,Math.round(simTickCount/MAX_TICKS*100));
    loadingBar.style.width=pct+"%";
    loadingText.textContent="Laying out graph... "+pct+"%";
  }

  // Cap simulation ticks
  if(simTickCount>=MAX_TICKS&&!simDone){
    simulation.stop();
    simDone=true;
    rebuildQuadtree();
    computeDensity();
    if(showLoading){
      loadingBar.style.width="100%";
      loadingText.textContent="Done!";
      setTimeout(function(){loadingOverlay.classList.add("hidden")},300);
    }
    zoomToFit(false);
    setupMinimap();
    draw();
    return;
  }

  // Only draw during simulation if small graph, otherwise skip frames
  if(N<2000||simTickCount%3===0){draw()}
});

// When simulation ends naturally (alpha < alphaMin)
simulation.on("end",function(){
  if(!simDone){
    simDone=true;
    rebuildQuadtree();
    computeDensity();
    if(showLoading){
      loadingBar.style.width="100%";
      loadingText.textContent="Done!";
      setTimeout(function(){loadingOverlay.classList.add("hidden")},300);
    }
    zoomToFit(false);
    setupMinimap();
    draw();
  }
});

var infoPanel=document.getElementById("info-panel");
var nodesById={};

function inspectorKv(key,value){
  if(value===undefined||value===null||value==="")return "";
  return '<div class="panel-row"><span class="k">'+esc(key)+'</span><span class="v">'+esc(truncate(String(value),80))+"</span></div>";

function inspectorSection(id,title,openByDefault,body){
  if(!body)return "";
  var openClass=openByDefault?" open":"";
  var caret=openByDefault?"&#x25BE;":"&#x25B8;"; // ▾ / ▸

  '</div>';

// Plain-English one-liner — explains WHAT this node is in pipeline terms,
// not just what type it is. Reads preprocessor.stage and walks links for context.
function inspectorOverviewLine(n){
  var stage=n.stage||"other";
  var label=truncate(n.name||n.id,30);
  // Find structural parents (edges INTO this node with structural relation)
  var parents=[];
  var children=0;
  for(var li=0;li<links.length;li++){
    var l=links[li];
    var sid=l.source.id||l.source;
    var tid=l.target.id||l.target;
    if(tid===n.id&&l.edge_class==="structural")parents.push({id:sid,relation:l.relation});
    if(sid===n.id&&l.edge_class==="structural")children++;
  }
  if(stage==="document"){
    return "Top-level document. Cognee extracted "+children+" child node(s) from it.";
  }
  if(stage==="chunk"){
    var doc=null;
    for(var pi=0;pi<parents.length;pi++){
      var p=nodesById[parents[pi].id];
      if(p&&p.stage==="document"){doc=p;break}
    }
    return doc
      ? "Chunk extracted from document “"+truncate(doc.name||doc.id,40)+"”."
      : "Chunk of text extracted by the chunking task.";
  }
  if(stage==="entity"){
    var fromChunk=null;
    var entityType=null;
    for(var pi2=0;pi2<parents.length;pi2++){
      var p2=nodesById[parents[pi2].id];
      if(p2&&p2.stage==="chunk")fromChunk=p2;
    }
    // Find type via outgoing is_a edge
    for(var li2=0;li2<links.length;li2++){
      var l2=links[li2];
      var sid2=l2.source.id||l2.source;
      if(sid2===n.id&&(l2.relation==="is_a"||(l2.edge_info&&l2.edge_info.relationship_name==="is_a"))){
        var t2=nodesById[l2.target.id||l2.target];
        if(t2){entityType=t2.name||t2.id;break}
      }
    }
    var parts=["Entity “"+label+"”"];
    if(entityType)parts[0]+=" of type "+entityType;
    if(fromChunk)parts.push("extracted from a chunk");
    return parts.join(", ")+".";
  }
  if(stage==="type"){
    return "Entity type. Groups "+children+" entit"+(children===1?"y":"ies")+".";
  }
  if(stage==="summary"){
    return "Summary built by the summarization task.";
  }
  if(stage==="context"){
    var lvl=n.level;
    var isRoot=n.is_root;
    if(isRoot)return "Root of the global context hierarchy.";
    if(lvl!==undefined&&lvl!==null)return "Global context bucket at level "+lvl+".";
    return "Global context bucket.";
  }
  if(stage==="schema"){
    return "Schema element ("+esc(n.type||"")+").";
  }
  return null;
}

function showNodeInfo(n){
  if(!n){infoPanel.classList.remove("visible");return}

  // Header
  var html='<div class="panel-header">';
  html+='<span class="panel-type" style="background:'+n.color+'22;color:'+n.color+'">'+esc(n.type||"Node")+"</span>";
  html+='<span class="panel-title">'+esc(truncate(n.name||n.id,40))+"</span></div>";

  // Plain-English overview
  var overview=inspectorOverviewLine(n);
  if(overview){
    html+='<div class="inspector-overview" style="font-size:12px;color:var(--text);line-height:1.5;margin-top:6px;padding-bottom:8px">'+overview+"</div>";
  }

  // Description text (if the node carries one)
  var desc=null;
  var descKeys=["description","summary","text","content"];
  for(var di=0;di<descKeys.length;di++){
    var v=n[descKeys[di]]||(n.properties&&n.properties[descKeys[di]]);
    if(typeof v==="string"&&v.trim()){desc=v.trim();break}
  }
  if(desc){
    html+='<div style="font-size:12px;color:var(--text2);line-height:1.5;margin-top:4px;font-style:italic">"'+esc(truncate(desc,300))+'"</div>';
  }

  // Source section: chain to originating document/chunk
  var sourceBody="";
  var seenSource=false;
  var pid=n.id;
  for(var depth=0;depth<3;depth++){
    var parent=null;
    for(var pli=0;pli<links.length;pli++){
      var pl=links[pli];
      var psid=pl.source.id||pl.source;
      var ptid=pl.target.id||pl.target;
      if(ptid===pid&&pl.edge_class==="structural"){
        parent=nodesById[psid];
        if(parent){break}
      }
    }
    if(!parent)break;
    sourceBody+=inspectorKv(parent.stage||parent.type||"parent",parent.name||parent.id);
    seenSource=true;
    pid=parent.id;
  }
  if(seenSource){
    html+=inspectorSection("source","Source",true,sourceBody);
  }

  // Provenance section (only when at least one field is set)
  var provBody=
    inspectorKv("Task",n.source_task)+
    inspectorKv("Pipeline",n.source_pipeline)+
    inspectorKv("Node Set",n.source_node_set)+
    inspectorKv("User",n.source_user)+
    (n.topological_rank&&n.topological_rank>0
      ? inspectorKv("Pipeline rank",n.topological_rank)
      : "");
  if(provBody){
    html+=inspectorSection("provenance","Provenance",true,provBody);
  }

  // Weights section: importance + feedback + ontology validity, plus a
  // tiny inline bar so the values are scannable. Only shown when any
  // weight or the ontology flag is set to something interesting
  // (non-default-0.5 weight, or ontology_valid set).
  function weightBar(value){
    var pct=Math.max(0,Math.min(1,(typeof value==="number")?value:0.5));
    var w=Math.round(pct*60);
    return '<div style="display:inline-block;width:60px;height:5px;background:var(--border);'+
      'border-radius:3px;vertical-align:middle;margin-right:6px;position:relative;">'+
      '<div style="width:'+w+'px;height:5px;background:var(--accent);border-radius:3px;"></div></div>';
  }
  var hasImp=(typeof n.importance_weight==="number")&&Math.abs(n.importance_weight-0.5)>0.001;
  var hasFb=(typeof n.feedback_weight==="number")&&Math.abs(n.feedback_weight-0.5)>0.001;
  var hasOnto=n.ontology_valid===true||n.ontology_valid===false;
  if(hasImp||hasFb||hasOnto){
    var wBody="";
    if(hasImp){
      wBody+='<div class="panel-row"><span class="k">Importance</span><span class="v">'+
        weightBar(n.importance_weight)+n.importance_weight.toFixed(2)+'</span></div>';
    }
    if(hasFb){
      wBody+='<div class="panel-row"><span class="k">Feedback</span><span class="v">'+
        weightBar(n.feedback_weight)+n.feedback_weight.toFixed(2)+'</span></div>';
    }
    if(hasOnto){
      var ovColor=n.ontology_valid?'#0DFF00':'var(--text2)';
      var ovLabel=n.ontology_valid?'ontology valid':'not in ontology';
      wBody+='<div class="panel-row"><span class="k">Ontology</span>'+
        '<span class="v" style="color:'+ovColor+';font-weight:500;">●  '+ovLabel+'</span></div>';
    }
    html+=inspectorSection("weights","Weights",true,wBody);
  }

  // Relations section: counts grouped by relation
  var relCounts={};
  for(var rli=0;rli<links.length;rli++){
    var rl=links[rli];
    var rsid=rl.source.id||rl.source;
    var rtid=rl.target.id||rl.target;
    if(rsid===n.id||rtid===n.id){
      var rel=rl.relation||"related";
      relCounts[rel]=(relCounts[rel]||0)+1;
    }
  }
  var relBody=inspectorKv("Connections",n._degree);
  Object.keys(relCounts).sort().forEach(function(r){
    relBody+=inspectorKv(r,relCounts[r]);
  });
  html+=inspectorSection("relations","Relations",true,relBody);

  // Raw section: collapsed by default
  var rawBody=
    inspectorKv("ID",truncate(n.id,36))+
    inspectorKv("Stage",n.stage)+
    inspectorKv("Visual rank",n.visual_rank);
  if(n.ontology_valid!==undefined&&n.ontology_valid!==null){
    rawBody+=inspectorKv("Ontology valid",String(n.ontology_valid));
  }
  if(n.properties){
    Object.keys(n.properties).slice(0,10).forEach(function(key){
      var pv=n.properties[key];
      if(pv!==undefined&&pv!==null&&typeof pv!=="object"){
        rawBody+=inspectorKv(key,pv);
      }
    });
  }
  html+=inspectorSection("raw","Raw",false,rawBody);

  infoPanel.innerHTML=html;
  infoPanel.classList.add("visible");

  // Wire section toggles
  infoPanel.querySelectorAll("[data-toggle]").forEach(function(tHeader){
    tHeader.addEventListener("click",function(){
      var sec=tHeader.parentElement;
      var body=sec.querySelector(".inspector-section-body");
      var caret=tHeader.querySelector(".inspector-caret");
      var isOpen=sec.classList.toggle("open");
      if(body)body.style.display=isOpen?"":"none";
      if(caret)caret.innerHTML=isOpen?"&#x25BE;":"&#x25B8;";
    });
  });
}

// ── Hit testing (Phase 3a: quadtree-accelerated) ──
function screenToWorld(sx,sy){return{x:(sx-tx)/scale,y:(sy-ty)/scale}}
function worldToScreen(wx,wy){return{x:wx*scale+tx,y:wy*scale+ty}}

function findNodeAt(sx,sy){
  var w=screenToWorld(sx,sy);
  var searchR=(20)/scale; // max search radius in world coords
  if(quadtree){
    var found=quadtree.find(w.x,w.y,searchR);
    if(found){
      var dx=found.x-w.x,dy=found.y-w.y;
      var d=Math.sqrt(dx*dx+dy*dy);
      var hitR=(found._r+4)/scale;
      if(d<hitR)return found;
    }
    return null;
  }
  // Fallback for before quadtree is built
  var best=null,bestD=Infinity;
  for(var i=nodes.length-1;i>=0;i--){
    var n=nodes[i];
    if(typeof n.x!=="number")continue;
    var dx2=n.x-w.x,dy2=n.y-w.y;
    var d2=Math.sqrt(dx2*dx2+dy2*dy2);
    var hitR2=(n._r+4)/scale;
    if(d2<hitR2&&d2<bestD){best=n;bestD=d2}
  }
  return best;
}

function findEdgeAt(sx,sy){
  var w=screenToWorld(sx,sy);
  var threshold=6/scale;
  // Only check edges with at least one endpoint in viewport (Phase 3b)
  var vp=getViewportWorld();
  var margin=50/scale;
  for(var i=0;i<links.length;i++){
    var e=links[i];
    var ax=e.source.x,ay=e.source.y,bx=e.target.x,by=e.target.y;
    if(typeof ax!=="number")continue;
    // Skip if both endpoints off-screen
    var sIn=ax>=vp.x1-margin&&ax<=vp.x2+margin&&ay>=vp.y1-margin&&ay<=vp.y2+margin;
    var tIn=bx>=vp.x1-margin&&bx<=vp.x2+margin&&by>=vp.y1-margin&&by<=vp.y2+margin;
    if(!sIn&&!tIn)continue;
    var ddx=bx-ax,ddy=by-ay;
    var len2=ddx*ddx+ddy*ddy;
    if(len2===0)continue;
    var t=Math.max(0,Math.min(1,((w.x-ax)*ddx+(w.y-ay)*ddy)/len2));
    var px=ax+t*ddx,py=ay+t*ddy;
    var dist=Math.sqrt((w.x-px)*(w.x-px)+(w.y-py)*(w.y-py));
    if(dist<threshold)return e;
  }
  return null;
}

// ── Viewport helpers (Phase 3b) ──
function getViewportWorld(){
  return{
    x1:-tx/scale,
    y1:-ty/scale,
    x2:(W-tx)/scale,
    y2:(H-ty)/scale
  };
}

function isInViewport(wx,wy,margin,vp){
  return wx>=vp.x1-margin&&wx<=vp.x2+margin&&wy>=vp.y1-margin&&wy<=vp.y2+margin;
}

// ── Mouse ──
var isDragging=false,dragNode=null,isPanning=false;
var lastMx=0,lastMy=0;

canvas.addEventListener("mousedown",function(ev){
  var mx=ev.offsetX,my=ev.offsetY;
  lastMx=mx;lastMy=my;
  var hit=findNodeAt(mx,my);
  if(hit){
    dragNode=hit;isDragging=true;
    dragNode.fx=dragNode.x;dragNode.fy=dragNode.y;
    simulation.alphaTarget(0.3).restart();
    canvas.style.cursor="grabbing";
  }else{
    isPanning=true;
    canvas.style.cursor="grabbing";
  }
});

canvas.addEventListener("mousemove",function(ev){
  var mx=ev.offsetX,my=ev.offsetY;
  if(isDragging&&dragNode){
    var w=screenToWorld(mx,my);
    dragNode.fx=w.x;dragNode.fy=w.y;
  }else if(isPanning){
    tx+=mx-lastMx;ty+=my-lastMy;
    draw();
  }else{
    var hit=findNodeAt(mx,my);
    if(hit!==hoveredNode){
      hoveredNode=hit;
      if(hoveredNode){
        showNodeInfo(hoveredNode);
        canvas.style.cursor="pointer";
      }else{
        var edge=findEdgeAt(mx,my);
        if(edge){showEdgeInfo(edge);canvas.style.cursor="pointer"}
        else{infoPanel.classList.remove("visible");canvas.style.cursor="grab"}
      }
      draw();
    }
  }
  lastMx=mx;lastMy=my;
});

canvas.addEventListener("mouseup",function(){
  if(isDragging&&dragNode){
    dragNode.fx=null;dragNode.fy=null;
    simulation.alphaTarget(0);
  }
  isDragging=false;dragNode=null;isPanning=false;
  canvas.style.cursor="grab";
});

canvas.addEventListener("mouseleave",function(){
  if(isDragging&&dragNode){dragNode.fx=null;dragNode.fy=null;simulation.alphaTarget(0)}
  isDragging=false;dragNode=null;isPanning=false;
  hoveredNode=null;draw();
});

// ── Double-click to zoom to node (Phase 1) ──
canvas.addEventListener("dblclick",function(ev){
  ev.preventDefault();
  var mx=ev.offsetX,my=ev.offsetY;
  var hit=findNodeAt(mx,my);
  if(hit&&typeof hit.x==="number"){
    var ns=clamp(scale*2,0.02,30);
    var ntx=W/2-hit.x*ns;
    var nty=H/2-hit.y*ns;
    smoothPanZoomTo(ns,ntx,nty,300);
  }
});

// ── Wheel zoom (Phase 1: proportional to deltaY) ──
canvas.addEventListener("wheel",function(ev){
  ev.preventDefault();
  if(zoomAnim)zoomAnim=null; // cancel any running animation
  var mx=ev.offsetX,my=ev.offsetY;
  var factor=Math.exp(-ev.deltaY*0.002);
  var newScale=clamp(scale*factor,0.02,30);
  var ratio=newScale/scale;
  tx=mx-(mx-tx)*ratio;
  ty=my-(my-ty)*ratio;
  scale=newScale;
  draw();
},{passive:false});

document.getElementById("btn-zoom-in").addEventListener("click",function(){

});
document.getElementById("btn-zoom-out").addEventListener("click",function(){

});
document.getElementById("btn-fit").addEventListener("click",function(){
